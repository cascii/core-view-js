name: npm

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Detect publishable version
        id: release
        run: |
          PACKAGE_NAME=$(node --eval "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name)")
          PACKAGE_VERSION=$(node --eval "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          SSMVER_VERSION=$(sed -n 's/^version = \"\(.*\)\"/\1/p' ssmver.toml | head -1)

          if [ -z "$SSMVER_VERSION" ]; then
            echo "Could not read version from ssmver.toml" >&2
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$SSMVER_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match ssmver.toml ($SSMVER_VERSION)" >&2
            exit 1
          fi

          PREV_PACKAGE_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node --eval "let data=''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => { if (data) console.log(JSON.parse(data).version); });" || true)

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_PACKAGE_VERSION" ] && [ "$PREV_PACKAGE_VERSION" = "$PACKAGE_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether version is already published
        if: steps.release.outputs.should_publish == 'true'
        id: npm
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.release.outputs.should_publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: npm run build

      - name: Publish package
        if: steps.release.outputs.should_publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: npm publish --provenance --access public
